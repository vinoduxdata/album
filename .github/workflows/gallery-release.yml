name: Release Gallery

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v3.0.5) — overrides auto-version'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  version:
    name: Compute Version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      skip: ${{ steps.version.outputs.skip }}
      version: ${{ steps.version.outputs.version }}
      major: ${{ steps.version.outputs.major }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          fetch-depth: 0
          fetch-tags: true

      - name: Compute next version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          # Manual override always wins — trust the caller and build.
          if [[ -n "$INPUT_VERSION" ]]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
            major=$(echo "$INPUT_VERSION" | sed 's/^v//' | cut -d. -f1)
            echo "major=v${major}" >> "$GITHUB_OUTPUT"
            echo "Version: $INPUT_VERSION (major: v${major}) — manual override"
            exit 0
          fi

          prev_tag=$(git tag --list 'v*.*.*' --sort=-version:refname | head -n1)
          if [[ -z "$prev_tag" ]]; then
            echo "::error::No existing version tags found. Run a manual release first."
            exit 1
          fi

          # Walk every commit since prev_tag. Aggregate the max bump level
          # across all release-worthy commits. Treat changelog:skip as a no-op
          # — it neither bumps nor blocks by itself. If ALL commits since the
          # last tag are changelog:skip, there's nothing to release.
          rank_of() {
            case "$1" in
              major) echo 3 ;;
              minor) echo 2 ;;
              patch) echo 1 ;;
              *) echo 0 ;;
            esac
          }

          bump=""
          has_non_skip_commit=false
          skipped_count=0
          total_count=0

          # %H is commit hash, %s is subject only (single line). PR number
          # lives in the subject since we squash-merge with "...(#NNN)".
          while IFS=$'\t' read -r sha subject; do
            [[ -z "$sha" ]] && continue
            total_count=$((total_count + 1))

            pr_num=$(echo "$subject" | grep -oP '#\K[0-9]+' | tail -1 || true)
            labels=""
            if [[ -n "$pr_num" ]]; then
              labels=$(gh pr view "$pr_num" --json labels --jq '.labels[].name' 2>/dev/null || true)
            fi

            if echo "$labels" | grep -q '^changelog:skip$'; then
              skipped_count=$((skipped_count + 1))
              echo "  · ${sha:0:7} ${subject}  [skip]"
              continue
            fi

            has_non_skip_commit=true
            commit_bump="patch"

            if echo "$labels" | grep -q '^changelog:feat$'; then
              commit_bump="minor"
            fi

            # Conventional Commits: `feat:` → minor, `feat!:` / `fix!:` → major
            if echo "$subject" | grep -qP '^[a-z]+(\([^)]+\))?!:'; then
              commit_bump="major"
            elif echo "$subject" | grep -qP '^feat(\([^)]+\))?:'; then
              [[ "$commit_bump" == "patch" ]] && commit_bump="minor"
            fi

            if [[ -z "$bump" ]] || (( $(rank_of "$commit_bump") > $(rank_of "$bump") )); then
              bump="$commit_bump"
            fi
            echo "  · ${sha:0:7} ${subject}  [${commit_bump}]"
          done < <(git log --format='%H%x09%s' "${prev_tag}..HEAD")

          echo "Scanned $total_count commits since $prev_tag ($skipped_count skipped)."

          if [[ "$has_non_skip_commit" == "false" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            if (( total_count == 0 )); then
              echo "Skipping release — no commits since $prev_tag"
            else
              echo "Skipping release — all $total_count commits since $prev_tag are changelog:skip"
            fi
            exit 0
          fi

          bump="${bump:-patch}"
          echo "skip=false" >> "$GITHUB_OUTPUT"

          major=$(echo "$prev_tag" | sed 's/^v//' | cut -d. -f1)
          minor=$(echo "$prev_tag" | sed 's/^v//' | cut -d. -f2)
          patch=$(echo "$prev_tag" | sed 's/^v//' | cut -d. -f3)

          case "$bump" in
            major) version="v$((major + 1)).0.0" ;;
            minor) version="v${major}.$((minor + 1)).0" ;;
            patch) version="v${major}.${minor}.$((patch + 1))" ;;
          esac

          new_major=$(echo "$version" | sed 's/^v//' | cut -d. -f1)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "major=v${new_major}" >> "$GITHUB_OUTPUT"
          echo "Version: $version (major: v${new_major}) — ${bump} bump from $prev_tag"

  build-server:
    name: Build Server (${{ matrix.platform }})
    if: needs.version.outputs.skip != 'true'
    needs: version
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Login to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply branding
        uses: ./.github/actions/apply-branding
        with:
          version: ${{ needs.version.outputs.version }}

      - name: Prepare platform pair
        id: prepare
        env:
          PLATFORM: ${{ matrix.platform }}
        run: echo "platform-pair=${PLATFORM//\//-}" >> "$GITHUB_OUTPUT"

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: server/Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            DEVICE=cpu
            BUILD_ID=${{ github.run_id }}
            BUILD_SOURCE_REF=${{ needs.version.outputs.version }}
            BUILD_SOURCE_COMMIT=${{ github.sha }}
          outputs: type=image,"name=ghcr.io/open-noodle/gallery-server",push-by-digest=true,name-resolution=short,push=true
          cache-from: type=gha,scope=server-${{ steps.prepare.outputs.platform-pair }}
          cache-to: type=gha,scope=server-${{ steps.prepare.outputs.platform-pair }},mode=max

      - name: Export digest
        run: | # zizmor: ignore[template-injection]
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: server-digests-${{ steps.prepare.outputs.platform-pair }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-server:
    name: Merge Server Manifest
    if: needs.version.outputs.skip != 'true'
    needs: [version, build-server]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: server-digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Login to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        env:
          IMAGE: ghcr.io/open-noodle/gallery-server
          VERSION: ${{ needs.version.outputs.version }}
          MAJOR: ${{ needs.version.outputs.major }}
        run: |
          tags="-t ${IMAGE}:${VERSION} -t ${IMAGE}:${MAJOR} -t ${IMAGE}:release"
          sources=$(printf "${IMAGE}@sha256:%s " *)
          docker buildx imagetools create ${tags} ${sources}

  build-ml:
    name: Build ML ${{ matrix.device }} (${{ matrix.platform }})
    if: needs.version.outputs.skip != 'true'
    needs: version
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - device: cpu
            platform: linux/amd64
            runner: ubuntu-latest
          - device: cpu
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - device: cuda
            platform: linux/amd64
            runner: ubuntu-latest
          - device: openvino
            platform: linux/amd64
            runner: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Login to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply branding
        uses: ./.github/actions/apply-branding
        with:
          version: ${{ needs.version.outputs.version }}

      - name: Prepare platform pair
        id: prepare
        env:
          PLATFORM: ${{ matrix.platform }}
        run: echo "platform-pair=${PLATFORM//\//-}" >> "$GITHUB_OUTPUT"

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: machine-learning
          file: machine-learning/Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            DEVICE=${{ matrix.device }}
          outputs: type=image,"name=ghcr.io/open-noodle/gallery-ml",push-by-digest=true,name-resolution=short,push=true
          cache-from: type=gha,scope=ml-${{ matrix.device }}-${{ steps.prepare.outputs.platform-pair }}
          cache-to: type=gha,scope=ml-${{ matrix.device }}-${{ steps.prepare.outputs.platform-pair }},mode=max

      - name: Export digest
        run: | # zizmor: ignore[template-injection]
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ml-${{ matrix.device }}-digests-${{ steps.prepare.outputs.platform-pair }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-ml:
    name: Merge ML Manifest (${{ matrix.device }})
    if: needs.version.outputs.skip != 'true'
    needs: [version, build-ml]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - device: cpu
            suffix: ''
          - device: cuda
            suffix: '-cuda'
          - device: openvino
            suffix: '-openvino'
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: ml-${{ matrix.device }}-digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Login to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        env:
          IMAGE: ghcr.io/open-noodle/gallery-ml
          VERSION: ${{ needs.version.outputs.version }}
          MAJOR: ${{ needs.version.outputs.major }}
          SUFFIX: ${{ matrix.suffix }}
        run: |
          tags="-t ${IMAGE}:${VERSION}${SUFFIX} -t ${IMAGE}:${MAJOR}${SUFFIX} -t ${IMAGE}:release${SUFFIX}"
          sources=$(printf "${IMAGE}@sha256:%s " *)
          docker buildx imagetools create ${tags} ${sources}

  build-mobile:
    name: Build Mobile
    if: needs.version.outputs.skip != 'true'
    needs: version
    permissions:
      contents: read
    uses: ./.github/workflows/gallery-build-mobile.yml
    with:
      environment: production
      version: ${{ needs.version.outputs.version }}
    secrets: inherit

  tag:
    name: Create Git Tag
    if: needs.version.outputs.skip != 'true'
    needs: [version, merge-server, merge-ml, build-mobile]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: true
          fetch-depth: 0
          fetch-tags: true

      - name: Create tags
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          major=$(echo "$VERSION" | sed 's/^v//' | cut -d. -f1)

          # Create version tag (e.g. v3.0.1)
          git tag "$VERSION"

          # Update major version tag (e.g. v3) — floats to latest release
          git tag -f "v${major}"

          # Update release tag — always points to latest build
          git tag -f "release"

          git push origin "$VERSION" "v${major}" "release" --force

      - name: Download APK artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: gallery-apk
          path: ${{ runner.temp }}/apk

      - name: Create GitHub Release
        env:
          VERSION: ${{ needs.version.outputs.version }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          upstream_version=$(jq -r '.upstream.version' branding/config.json)
          prev_tag=$(git tag --list 'v*.*.*' --sort=-version:refname | sed -n '2p')

          notes="Based on [Immich v${upstream_version}](https://github.com/immich-app/immich/releases/tag/v${upstream_version})"

          if [[ -n "$prev_tag" ]]; then
            # Separate Gallery commits (PR# < 1000 or no PR ref) from upstream (PR# >= 1000)
            # After a rebase, git log shows rewritten Gallery commits as new — skip them.
            # Note: each loop body uses an explicit if/then so the last command on every
            # iteration exits 0. Otherwise `[[ ... ]] && echo` returns 1 when the filter
            # rejects a line, the while loop inherits that exit code, and the command
            # substitution fails — which on the runner's strict bash kills the whole step.
            all_commits=$(git log --pretty=format:'%s' "${prev_tag}..HEAD" 2>/dev/null)

            gallery_commits=$(echo "$all_commits" | while IFS= read -r line; do
              [[ -z "$line" ]] && continue
              pr_num=$(echo "$line" | grep -oP '\(#\K[0-9]+(?=\))' | head -1)
              if [[ -z "$pr_num" || "$pr_num" -lt 1000 ]]; then
                echo "- $line"
              fi
            done)

            upstream_commits=$(echo "$all_commits" | while IFS= read -r line; do
              [[ -z "$line" ]] && continue
              pr_num=$(echo "$line" | grep -oP '\(#\K[0-9]+(?=\))' | head -1)
              if [[ -n "$pr_num" && "$pr_num" -ge 1000 ]]; then
                echo "- $line"
              fi
            done)

            if [[ -n "$upstream_commits" ]]; then
              # Rebase release — only show upstream commits
              printf -v notes '%s\n\n<details>\n<summary>Upstream commits</summary>\n\n%s\n\n</details>' "$notes" "$upstream_commits"
            elif [[ -n "$gallery_commits" ]]; then
              # Normal release — show Gallery changes
              printf -v notes '%s\n\n## Changes\n\n%s' "$notes" "$gallery_commits"
            fi
          fi

          gh release create "$VERSION" "$RUNNER_TEMP/apk/gallery-${VERSION}.apk" \
            --title "$VERSION" --latest -n "$notes"

  publish-version-endpoint:
    name: Publish Version Endpoint
    if: needs.version.outputs.skip != 'true'
    needs: [version, tag]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: arn:aws:iam::660432264815:role/noodle-prod-gallery-release-version-upload
          aws-region: eu-west-1

      - name: Build and upload version.json
        env:
          VERSION: ${{ needs.version.outputs.version }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          # Validate version format (keep v prefix for wire-format parity with upstream Immich)
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version tag: $VERSION"
            exit 1
          fi

          # Fetch published_at from the GitHub Release created by the tag job.
          # Retry briefly in case of transient GH API issues immediately after release create.
          published_at=""
          for attempt in 1 2 3; do
            published_at=$(gh release view "$VERSION" --repo "$REPO" --json publishedAt --jq .publishedAt 2>/dev/null || true)
            if [[ -n "$published_at" && "$published_at" != "null" ]]; then
              break
            fi
            echo "Attempt ${attempt}: could not read publishedAt, retrying in 5s..."
            sleep 5
          done
          if [[ -z "$published_at" || "$published_at" == "null" ]]; then
            echo "::error::Could not read publishedAt for release $VERSION after 3 attempts"
            exit 1
          fi

          printf '{"version":"%s","published_at":"%s"}' "$VERSION" "$published_at" > /tmp/gallery

          aws s3 cp /tmp/gallery s3://noodle-prod-version/gallery \
            --content-type "application/json; charset=utf-8" \
            --cache-control "public, max-age=300"
